services:
  - type: web
    name: tradejournal-api
    runtime: docker
    dockerContext: ./server
    dockerFilePath: ./server/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health
